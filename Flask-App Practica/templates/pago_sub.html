<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago suscripción</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='pago_sub.css') }}">
</head>
<body>
    <!-- Header -->
    <header>
    <a href="/" class="logo">
        <img src="{{ url_for('static', filename='Logo_Titan_Lab.png') }}" alt="Titan Lab" class="logo-img">
        <span>Titan</span>Lab
    </a>

        <nav>
            <a href="/">Inicio</a>
            <a href="#">Suplementos</a>
            <a href="#">Ejercicios</a>
            <a href="/rutina">Rutina</a>
            <a href="/dieta">Dieta</a>
            <a href="/planes">Planes</a>
        </nav>  
        <div class="auth-buttons">
            <button class="btn-secondary">Login</button>
            <button class="btn-primary">Registrarse</button>
        </div>
    </header>
    <main class="page">
        <section class="payment-container">
            <a href="{{ url_for('planes') }}" class="back-btn">← Volver a planes</a>

            <div class="plan-card">
                <div class="plan-info">
                    <h1>{{ plan_nombre if plan_nombre else "Coach Premium" }}</h1>
                    <p>Suscripción mensual</p>
                </div>

                <div class="price-box">
                    <div class="price">{{ precio if precio else "22,99€" }}</div>
                    <span>/mes</span>
                </div>
            </div>

            <h2 class="section-title">Método de pago</h2>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('paypal', this)">PayPal</button>
                <button class="tab-btn" onclick="showTab('applepay', this)">Apple Pay</button>
            </div>

            <div id="paypal" class="tab-content active">
                <form class="payment-form" method="POST" action="/procesar-paypal">
                    <div class="form-group">
                        <label for="paypal-email">Email de PayPal</label>
                        <input
                            type="email"
                            id="paypal-email"
                            name="paypal_email"
                            placeholder="tu@email.com"
                            required
                        >
                    </div>
                    <button type="button" class="pay-btn" onclick="window.location.href='/pago-exitoso'">Pagar con PayPal</button>
                </form>
            </div>

            <div id="applepay" class="tab-content">
                <form class="payment-form" method="POST" action="/procesar-applepay">
                    <div class="form-group">
                        <label for="apple-email">Email de Apple Pay</label>
                        <input
                            type="email"
                            id="apple-email"
                            name="apple_email"
                            placeholder="tu@email.com"
                            required
                        >
                    </div>
                    <button type="button" class="pay-btn" onclick="window.location.href='/pago-exitoso'">Pagar con Apple Pay</button>
                </form>
            </div>
            <p class="secure-text">🔒 Pago seguro con cifrado SSL</p>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Titan Lab.</p>
    </footer>

    <script>
        function showTab(tabId, button) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-btn');

            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        }
    </script>
</body>
</html>
